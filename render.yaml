services:
  - type: web
    name: portfolio-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn chat_proxy:app
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_API_URL
        value: https://api.anthropic.com/v1/messages
